name = "santrionline-news-fetcher"
main = "index.ts"
compatibility_date = "2024-11-19"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Cron memakai UTC. WIB = UTC+7:
# 06.00 WIB = 23.00 UTC, 12.00 WIB = 05.00 UTC, 18.00 WIB = 11.00 UTC.
[triggers]
crons = ["0 23 * * *", "0 5 * * *", "0 11 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "db-app"
database_id = "9c7b8ab4-8e7a-406d-9e44-6da413d7d9e0"

[[r2_buckets]]
binding = "R2"
bucket_name = "santri-online-files"

[ai]
binding = "AI"

[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"
R2_PUBLIC_BASE_URL = "https://files.santrionline.com"

# Secrets:
# wrangler secret put GROQ_API_KEY --config workers/news-fetcher/wrangler.toml
# wrangler secret put NEWS_FETCH_SECRET --config workers/news-fetcher/wrangler.toml

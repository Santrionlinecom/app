# wrangler.toml
name = 'santrionlineapp'
compatibility_date = "2024-11-19"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[vars]
PUBLIC_BASE_URL = "https://app.santrionline.com"
R2_PUBLIC_BASE_URL = "https://files.santrionline.com"
TURNSTILE_SITE_KEY = "0x4AAAAAADFy-tk3UwwNRRLK"
PUBLIC_CLARITY_PROJECT_ID = "wjd6jb7tnb"
PUBLIC_UMAMI_SCRIPT_URL = "https://cloud.umami.is/script.js"
PUBLIC_UMAMI_WEBSITE_ID = "4367f37b-32a2-4732-bbce-71192ac5fa17"
GOOGLE_CLIENT_ID = "511759368556-iu4bj02gusic1e0tqindpi5lriis9lkv.apps.googleusercontent.com"
WHATSAPP_PAYMENT_NOTIFICATIONS_ENABLED = "false"
PAYMENT_EMAIL_NOTIFICATIONS_ENABLED = "true"
REGISTRATION_EMAIL_NOTIFICATIONS_ENABLED = "true"
BUSINESS_AGENT_AGENT_API_ENABLED = "false"

# --- Sentry ---
# Set these in Cloudflare Pages Dashboard > Settings > Variables and Secrets:
# PUBLIC_SENTRY_DSN -> Secret or plaintext, used by SvelteKit at build/runtime.
# SENTRY_AUTH_TOKEN -> Secret, used by @sentry/vite-plugin for source map upload.
# Do not add PUBLIC_SENTRY_DSN as an active [vars] entry here when it already
# exists in the Dashboard, otherwise Cloudflare Pages will reject the deploy as
# a duplicate binding.

# Secrets are not stored in wrangler.toml.
# PUBLIC_SENTRY_DSN -> set in Cloudflare Pages Dashboard
# SENTRY_AUTH_TOKEN -> set in Cloudflare Pages Dashboard
# GOOGLE_CLIENT_SECRET -> wrangler secret put GOOGLE_CLIENT_SECRET
# LICENSE_SIGNING_SECRET -> wrangler secret put LICENSE_SIGNING_SECRET
# GROQ_API_KEY -> wrangler secret put GROQ_API_KEY
# NEWS_FETCH_SECRET -> set as the same value used by the news fetcher Worker
# NEWS_FETCHER_URL -> set after deploying santrionline-news-fetcher
# MIDTRANS_SERVER_KEY -> wrangler pages secret put
# MIDTRANS_CLIENT_KEY -> wrangler pages secret put
# WHATSAPP_ACCESS_TOKEN -> permanent System User token; set as Pages secret
# WHATSAPP_PAYMENT_NOTIFICATIONS_ENABLED -> must be exactly "true" to allow outbound payment messages; currently false
# WHATSAPP_WEBHOOK_VERIFY_TOKEN -> user-generated Meta webhook verification token; set as Pages secret
# WHATSAPP_PHONE_NUMBER_ID -> numeric Meta Phone Number ID, not the visible phone number
# WHATSAPP_GRAPH_API_VERSION -> Pages variable, e.g. the active Meta Graph API version
# WHATSAPP_PAYMENT_SUCCESS_TEMPLATE -> approved template name with 4 body parameters
# WHATSAPP_TEMPLATE_LANGUAGE -> Pages variable matching the approved template language
# PAYMENT_EMAIL_NOTIFICATIONS_ENABLED -> set to "true" after transactional email provider is configured
# RESEND_API_KEY -> Pages secret for transactional payment email; never commit the value
# PAYMENT_EMAIL_FROM -> verified sender, e.g. SantriOnline <transaksi@santrionline.com>
# BUSINESS_AGENT_AGENT_API_ENABLED -> keep false until Hermes service authentication is configured
# BUSINESS_AGENT_SERVICE_TOKEN -> Pages secret; minimum 32 chars, never commit the value
# TURNSTILE_SECRET_KEY -> wrangler secret put TURNSTILE_SECRET_KEY

# --- Konfigurasi Database D1 ---
[[d1_databases]]
binding = "DB" # Ini nama variabel yang akan kita panggil di kodingan (misal: platform.env.DB)
database_name = "db-app"
database_id = "9c7b8ab4-8e7a-406d-9e44-6da413d7d9e0"
# --- Konfigurasi R2 Storage ---
[[r2_buckets]]
binding = "BUCKET" # Ini nama variabel untuk storage (misal: platform.env.BUCKET)
bucket_name = "santri-online-files"

[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "santri_kitab_index"

[ai]
binding = "AI"
